<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Russell Home Roasting — Roast Record Lookup</title>
  <style>
    :root {
      --bg: #f7f5f0;
      --fg: #0e0d0b;
      --line: #0e0d0b;
      --muted: #7a7670;
      --soft: #dedad2;
      --accent: #f7f5f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    body {
      font-family: Georgia, "Times New Roman", Times, serif;
    }

    /* ── PAGE GRID ── */
    .page {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(40px);
      animation: rise 0.4s ease-out forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── LEFT RAIL ── */
    .rail {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 52px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      z-index: 10;
      background: var(--bg);
    }

    .rail-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--fg);
    }

    .rail-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN CONTENT ── */
    .content {
      margin-left: 52px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 32px 28px 24px;
      border-bottom: 3px solid var(--line);
      position: relative;
      margin-bottom: 5px;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0; right: 0;
      height: 1px;
      background: var(--line);
    }

    .brand {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .brand span {
      display: block;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── BODY GRID ── */
    .body-grid {
      display: grid;
      grid-template-columns: 1fr 140px;
      grid-template-rows: 1fr auto;
      border-bottom: 1px solid var(--soft);
    }

    /* ── MAIN PANEL ── */
    .main-panel {
      padding: 48px 28px 56px;
      border-right: 1px solid var(--line);
    }

    /* ── SIDE NAV ── */
    .side-nav {
      display: flex;
      flex-direction: column;
    }

    .side-nav a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      border: 1px solid var(--soft);
      margin-bottom: -1px;
      transition: background 0.15s, color 0.15s;
      padding: 20px 0;
      white-space: nowrap;
    }

    .side-nav a:hover {
      background: var(--fg);
      color: var(--bg);
    }
	.side-nav a.active {
      background: var(--fg);
      color: var(--bg);
    }

    /* ── FOOTER ── */
    footer {
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      border-top: 1px solid var(--soft);
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── LOOKUP BOX ── */
    .lookup {
      border: 1px solid var(--line);
      padding: 20px;
      margin-bottom: 32px;
      background: var(--bg);
    }

    .lookup-label {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 8px;
    }

    .lookup-help {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .lookup-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      padding: 11px 14px;
      font-size: 0.9rem;
      font-family: Arial, Helvetica, sans-serif;
      border-radius: 0;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="text"]:focus {
      outline: 2px solid var(--fg);
      outline-offset: 1px;
    }

    button {
      border: 1px solid var(--line);
      background: var(--fg);
      color: var(--bg);
      padding: 11px 18px;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;
      font-family: Arial, Helvetica, sans-serif;
      transition: background 0.15s, color 0.15s;
    }

    button:hover,
    button:focus-visible {
      background: var(--bg);
      color: var(--fg);
    }

    /* ── RECORD ── */
    .record {
      border-top: 3px solid var(--line);
      padding-top: 24px;
      position: relative;
    }

    .record::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 0; right: 0;
      height: 1px;
      background: var(--line);
      margin-top: 2px;
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 24px;
    }

    .record-id {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .record-date {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: Arial, Helvetica, sans-serif;
    }

    .record-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px 32px;
    }

    .section-title {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 400;
    }

    .rows {
      border-top: 1px solid var(--line);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 7px 0;
      border-bottom: 1px solid var(--soft);
      font-size: 0.88rem;
      font-family: Arial, Helvetica, sans-serif;
    }

    .row-label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
    }

    .row-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--fg);
    }

    .full {
      grid-column: 1 / -1;
    }

    /* ── CHART ── */
    .chart-wrap {
      border: 1px solid var(--line);
      padding: 12px;
      margin-top: 12px;
      background: var(--bg);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .axis,
    .grid,
    .curve,
    .marker {
      fill: none;
      stroke: var(--fg);
    }

    .axis { stroke-width: 1; }
    .grid { stroke-width: 0.5; stroke-dasharray: 2 3; stroke: var(--soft); }
    .curve { stroke-width: 2; }
    .marker { stroke-width: 1; stroke-dasharray: 5 4; stroke: var(--muted); }

    .axis-text {
      fill: var(--muted);
      font-size: 10px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .chart-note {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.06em;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ── STATES ── */
    .empty-state,
    .error-state {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 20px;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.03em;
    }

    .error-state {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      color: var(--fg);
    }

    .error-state strong {
      font-style: italic;
    }

    .error-hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ── MOBILE ── */
    @media (max-width: 560px) {
      .rail { display: none; }
      .content { margin-left: 0; }

      .body-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .main-panel {
        border-right: none;
        padding: 32px 22px 48px;
      }

      .side-nav {
        flex-direction: row;
        flex-wrap: wrap;
        border-top: 1px solid var(--line);
      }

      .side-nav a {
        writing-mode: horizontal-tb;
        transform: none;
        flex: none;
        width: 50%;
        justify-content: flex-start;
        padding: 16px 22px;
        font-size: 0.8rem;
        border: none;
        border-bottom: 1px solid var(--soft);
        border-right: 1px solid var(--soft);
        margin-bottom: 0;
        white-space: normal;
      }

      .side-nav a:nth-child(even) { border-right: none; }

      .lookup-row { flex-direction: column; }
      .record-header { flex-direction: column; align-items: flex-start; }
      .record-grid { grid-template-columns: 1fr; }
      .row { flex-direction: column; gap: 2px; }
      .row-value { text-align: left; }
      button { width: 100%; }

      footer { padding: 14px 22px; }
      header { padding: 24px 22px 20px; }
    }
  </style>
</head>
<body>

  <aside class="rail" aria-hidden="true">
    <div class="rail-dot"></div>
    <div class="rail-text"> · Estd 2026 · </div>
    <div class="rail-dot"></div>
  </aside>

  <main class="page">
    <div class="content">

      <header>
        <h1 class="brand">
          Russell Home Roasting
          <span>Roast Record Lookup</span>
        </h1>
      </header>

      <div class="body-grid">

        <div class="main-panel">

          <section class="lookup" aria-labelledby="lookup-title">
            <div class="lookup-label" id="lookup-title">Enter Batch No.</div>
            <div class="lookup-help">Scan once, search any roast. Enter the batch number printed on the bag.</div>
            <form id="lookup-form" class="lookup-row" autocomplete="off">
              <input id="batch-input" name="batch" type="text" placeholder="e.g. GA12659" aria-label="Batch number" />
              <button type="submit">View Record</button>
            </form>
          </section>

          <section id="result" aria-live="polite"></section>

        </div>

        <nav class="side-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="journal.html">Journal</a>
          <a href="origins.html">Origins</a>
          <a href="batch.html" class="active">Batches</a>
          <a href="https://forms.gle/ZgAe8ggtJFaLG8N4A">Order</a>
          <a href="about.html">About</a>
        </nav>


      </div>

      <footer>
        <span>Russell Home Roasting · Appleton, WI</span>
        <span>built by hand, like the coffee</span>
      </footer>

    </div>
  </main>

  <script>
    async function fetchBatch(batch) {
      const response = await fetch(`data/${batch}.json`);
      if (!response.ok) throw new Error('Batch not found');
      return await response.json();
    }

    const resultEl = document.getElementById('result');
    const form = document.getElementById('lookup-form');
    const input = document.getElementById('batch-input');

    function normalizeBatch(value) {
      return value.trim().toUpperCase();
    }

    function formatDate(value) {
      const date = new Date(value + 'T00:00:00');
      return date.toLocaleDateString(undefined, {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function secondsToMinSec(total) {
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function renderRows(rows) {
      return `
        <div class="rows">
          ${rows.map(row => `
            <div class="row">
              <div class="row-label">${row.label}</div>
              <div class="row-value">${row.value}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderChart(points, firstCrackS, totalTimeS) {
      if (!Array.isArray(points) || !points.length) {
        return '<div class="empty-state">No roast curve data available.</div>';
      }

      const width = 700, height = 280;
      const pad = { top: 16, right: 18, bottom: 36, left: 42 };
      const maxX = Math.max(totalTimeS || 0, ...points.map(p => p.time_s), 1);
      const temps = points.map(p => p.bean_temp_f);
      const minYData = Math.min(...temps), maxYData = Math.max(...temps);
      const minY = Math.floor((minYData - 20) / 25) * 25;
      const maxY = Math.ceil((maxYData + 10) / 25) * 25;
      const innerW = width - pad.left - pad.right;
      const innerH = height - pad.top - pad.bottom;
      const x = t => pad.left + (t / maxX) * innerW;
      const y = temp => pad.top + (1 - ((temp - minY) / (maxY - minY || 1))) * innerH;

      const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${x(p.time_s).toFixed(2)} ${y(p.bean_temp_f).toFixed(2)}`).join(' ');

      const yTicks = [];
      for (let v = minY; v <= maxY; v += 50) yTicks.push(v);
      const xTicks = [];
      const xStep = maxX <= 480 ? 60 : 120;
      for (let v = 0; v <= maxX; v += xStep) xTicks.push(v);
      if (xTicks[xTicks.length - 1] !== maxX) xTicks.push(maxX);

      return `
        <div class="chart-wrap">
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Roast curve">
            ${yTicks.map(tick => `
              <line class="grid" x1="${pad.left}" y1="${y(tick)}" x2="${width - pad.right}" y2="${y(tick)}"></line>
              <text class="axis-text" x="${pad.left - 8}" y="${y(tick) + 4}" text-anchor="end">${tick}</text>
            `).join('')}
            ${xTicks.map(tick => `
              <line class="grid" x1="${x(tick)}" y1="${pad.top}" x2="${x(tick)}" y2="${height - pad.bottom}"></line>
              <text class="axis-text" x="${x(tick)}" y="${height - 10}" text-anchor="middle">${Math.round(tick / 60)}m</text>
            `).join('')}
            <line class="axis" x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>
            <line class="axis" x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}"></line>
            ${firstCrackS ? `
              <line class="marker" x1="${x(firstCrackS)}" y1="${pad.top}" x2="${x(firstCrackS)}" y2="${height - pad.bottom}"></line>
              <text class="axis-text" x="${x(firstCrackS) + 6}" y="${pad.top + 12}">First crack</text>
            ` : ''}
            <path class="curve" d="${path}"></path>
            <text class="axis-text" x="${width / 2}" y="${height - 2}" text-anchor="middle">Time</text>
            <text class="axis-text" x="14" y="${height / 2}" text-anchor="middle" transform="rotate(-90 14 ${height / 2})">Bean temp (F)</text>
          </svg>
          <div class="chart-note">Bean temperature over roast duration.</div>
        </div>
      `;
    }

    function renderRecord(record) {
      resultEl.innerHTML = `
        <article class="record">
          <div class="record-header">
            <div>
              <div class="record-id">${record.roast_id}</div>
              <div class="record-date">Roast record</div>
            </div>
            <div class="record-date">Roasted ${formatDate(record.date)}</div>
          </div>

          <div class="record-grid">
            <section>
              <div class="section-title">Origin</div>
              ${renderRows([
                { label: 'Coffee', value: record.bean.name },
                { label: 'Country', value: record.bean.origin },
                { label: 'Region', value: record.bean.region },
                { label: 'Process', value: record.bean.process },
                { label: 'Variety', value: record.bean.variety.join(', ') },
                { label: 'Elevation', value: `${record.bean.elevation_m} m` }
              ])}
            </section>

            <section>
              <div class="section-title">Batch</div>
              ${renderRows([
                { label: 'Green weight', value: `${record.batch.green_weight_g} g` },
                { label: 'Roasted weight', value: `${record.batch.roasted_weight_g} g` },
                { label: 'Weight loss', value: `${record.batch.weight_loss_pct} %` },
                { label: 'Roast level', value: record.notes.roast_level }
              ])}
            </section>

            <section>
              <div class="section-title">Profile</div>
              ${renderRows([
                { label: 'Charge temp', value: `${record.profile.charge_temp_f} F` },
                { label: 'Drop temp', value: `${record.profile.drop_temp_f} F` },
                { label: 'Total time', value: secondsToMinSec(record.profile.total_time_s) },
                { label: 'First crack', value: secondsToMinSec(record.profile.first_crack_s) },
                { label: 'Development', value: secondsToMinSec(record.profile.development_time_s) }
              ])}
            </section>

            <section>
              <div class="section-title">Cup</div>
              ${renderRows([
                { label: 'Notes', value: record.notes.cupping.join(', ') },
                { label: 'Comment', value: record.notes.comments }
              ])}
            </section>

            <section class="full">
              <div class="section-title">Roast Curve</div>
              ${renderChart(record.measurements, record.profile.first_crack_s, record.profile.total_time_s)}
            </section>
          </div>
        </article>
      `;
    }

    function renderEmpty() {
      resultEl.innerHTML = '<div class="empty-state">Enter a batch number to view its roast record.</div>';
    }

    function renderError(batch) {
      resultEl.innerHTML = `
        <div class="error-state">
          No record found for <strong>${batch}</strong>.
          <div class="error-hint">Try one of the sample batches: PB-ET-GUJI-0406-A or PB-CO-HUILA-0408-A.</div>
        </div>
      `;
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      const batch = normalizeBatch(input.value);
      if (!batch) { renderEmpty(); return; }
      try {
        const record = await fetchBatch(batch);
        renderRecord(record);
      } catch (err) {
        renderError(batch);
      }
    });

    const params = new URLSearchParams(window.location.search);
    const presetBatch = normalizeBatch(params.get('batch') || '');

    if (presetBatch) {
      input.value = presetBatch;
      fetchBatch(presetBatch).then(renderRecord).catch(() => renderError(presetBatch));
    } else {
      renderEmpty();
    }
  </script>
</body>
</html>
